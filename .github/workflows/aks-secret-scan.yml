name: AKS Secret Scanner

on:
  schedule:
    - -----cron: '0 0 * * *'  # Daily at midnight
  workflow_dispatch:
    inputs:
      context:
        description: 'Kubernetes Context'
        required: true
      namespace:
        description: 'Namespace'
        required: true
      search_string:
        description: 'Secret/String to Search'
        required: true

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Azure CLI
        run: |
          curl -sL https://aka.ms/InstallAzureCLIDeb | sudo bash

      - name: Setup kubectl
        run: |
          sudo apt-get update && sudo apt-get install -y kubectl jq

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Setup kubeconfig
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
        run: |
          echo "$KUBE_CONFIG" | base64 -d > kubeconfig

      - name: Search Secret Usage
        env:
          KUBECONFIG: ${{ secrets.KUBE_CONFIG }}
          CONTEXT: ${{ github.event.inputs.context }}
          NAMESPACE: ${{ github.event.inputs.namespace }}
          SEARCH: ${{ github.event.inputs.search_string }}
        run: |
          chmod +x aks-agent-multi.sh
          echo "=== Secret Usage Report: $SEARCH ==="
          ./aks-agent-multi.sh -ctx "$CONTEXT" -ns "$NAMESPACE" -s "$SEARCH" -a search-secret

      - name: Upload Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: secret-scan-${{ github.run_number }}
          path: secret-scan-*.log
          retention-days: 30

      - name: Azure Logout
        if: always()
        run: az logout
